name: Deploy to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            mapfile -t changed_files < <(
              git show --name-only --diff-filter=ACMR --format='' "$head_sha" |
                while IFS= read -r file; do
                  [[ -f "$file" ]] && printf '%s\n' "$file"
                done
            )
          else
            mapfile -t changed_files < <(
              git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" |
                while IFS= read -r file; do
                  [[ -f "$file" ]] && printf '%s\n' "$file"
                done
            )
          fi

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${changed_files[@]}" > changed-files.txt
          echo "has_files=true" >> "$GITHUB_OUTPUT"

      - name: Run gitleaks on changed files
        if: steps.changed-files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            echo "Scanning $file"
            docker run --rm \
              -v "$PWD:/path" \
              zricethezav/gitleaks:latest \
              detect --no-git --source "/path/$file" --verbose --redact
          done < changed-files.txt

      - name: Skip gitleaks when no files changed
        if: steps.changed-files.outputs.has_files != 'true'
        run: echo "No added, copied, modified, or renamed files to scan."

  deploy:
    name: Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - build
      - secret-scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
